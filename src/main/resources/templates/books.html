<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Books</title>
</head>
<body>
    <h1>Available Books</h1>
    <a href="/">Back to Home</a>

    <ul>
        <li th:each="book : ${books}">
            <a th:href="@{/book/{id}(id=${book.id})}" th:text="${book.title}">Title</a>
        </li>
    </ul>

    <hr/>

    <h2>Add a new Book</h2>
    <form method="POST" action="/book/add">
        ID (e.g. HarryPotter): <input type="text" name="id" /><br/>
        Title: <input type="text" name="title" /><br/>
        Author: <input type="text" name="author" /><br/>
        Genre: <input type="text" name="genre" /><br/>
        Reading Level: <input type="text" name="level" /><br/>
        <input type="submit" value="Add Book" />
    </form>

    <div th:replace="~{chat :: chatbox}"></div>
</body>
</html>
