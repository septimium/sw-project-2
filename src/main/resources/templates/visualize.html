<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>JUNG Graph Visualization</title>
</head>
<body>
    <h1>RDF Graph Visualization (JUNG)</h1>
    <a href="/">Back to Home</a>
    
    <div th:if="${error}">
        <p style="color: red; font-weight: bold;" th:text="${error}"></p>
    </div>

    <div th:if="${graphImage}">
        <h2>Visualized using JUNG Java API</h2>
        <img th:src="'data:image/png;base64,' + ${graphImage}" alt="RDF Graph" style="border: 1px solid black;" />
    </div>

</body>
</html>
